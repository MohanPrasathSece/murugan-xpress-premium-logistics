<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f1f4a"/>
    </linearGradient>
    <linearGradient id="velGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f1f4a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#navyGrad)" filter="url(#shadow)"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- ── Vel (spear) shape ── -->
  <!-- Spear blade: elongated diamond pointing up -->
  <path d="M60 14 L68 38 L60 48 L52 38 Z" fill="url(#velGrad)"/>
  <!-- Blade center line highlight -->
  <line x1="60" y1="16" x2="60" y2="46" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Spear shaft -->
  <rect x="58.5" y="47" width="3" height="42" rx="1.5" fill="#e2e8f0"/>

  <!-- Spear base / butt cap: small diamond -->
  <path d="M60 89 L63.5 95 L60 106 L56.5 95 Z" fill="#e2e8f0"/>

  <!-- ── Decorative wing / motion lines (speed) ── -->
  <line x1="36" y1="54" x2="52" y2="60" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="31" y1="60" x2="52" y2="64" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <line x1="84" y1="54" x2="68" y2="60" stroke="#dc2626" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="89" y1="60" x2="68" y2="64" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- ── Small lotus petals at shaft midpoint (Murugan motif) ── -->
  <ellipse cx="60" cy="68" rx="6" ry="3.5" fill="#1e3a8a" stroke="#dc2626" stroke-width="1.2"/>
  <ellipse cx="60" cy="68" rx="3" ry="6" fill="#1e3a8a" stroke="#dc2626" stroke-width="1.2"/>
</svg>
